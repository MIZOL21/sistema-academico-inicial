<div class="container">
  <div class="header">
    <h1>Registro de Asistencia</h1>
    
    <div class="controls" *ngIf="authService.isAdmin() || authService.currentRole() === 'DOCENTE'">
      <mat-form-field appearance="outline" class="date-picker">
        <mat-label>Seleccionar Fecha</mat-label>
        <input matInput [matDatepicker]="picker" [(ngModel)]="currentDate" (dateChange)="onDateChange()">
        <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-datepicker #picker></mat-datepicker>
      </mat-form-field>

      <button mat-stroked-button color="primary" (click)="markAllAsPresent()">
        <mat-icon>done_all</mat-icon> Marcar todos como Presente
      </button>
    </div>
  </div>

  <mat-card class="asistencia-card">
    <table mat-table [dataSource]="dataSource" class="full-width-table">
      
      <ng-container matColumnDef="estudiante">
        <th mat-header-cell *matHeaderCellDef> Estudiante </th>
        <td mat-cell *matCellDef="let row"> 
          <div class="student-cell">
            {{row.studentName}}
            <mat-icon class="alert-icon" *ngIf="getAbsenceAlert(row.studentId)" 
                      matTooltip="Este estudiante tiene 3 o más inasistencias">
              warning
            </mat-icon>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef> Fecha </th>
        <td mat-cell *matCellDef="let row"> {{row.date | date:'dd/MM/yyyy'}} </td>
      </ng-container>

      <ng-container matColumnDef="estado">
        <th mat-header-cell *matHeaderCellDef> Estado de Asistencia </th>
        <td mat-cell *matCellDef="let row">
          <mat-button-toggle-group 
            [value]="row.status" 
            (change)="onStatusChange(row, $event.value)"
            [disabled]="!authService.isAdmin() && authService.currentRole() !== 'DOCENTE'">
            <mat-button-toggle value="presente" class="btn-presente">Presente</mat-button-toggle>
            <mat-button-toggle value="ausente" class="btn-ausente">Ausente</mat-button-toggle>
            <mat-button-toggle value="atraso" class="btn-atraso">Atraso</mat-button-toggle>
            <mat-button-toggle value="justificado" class="btn-justificado">Justificado</mat-button-toggle>
          </mat-button-toggle-group>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.row-alert]="getAbsenceAlert(row.studentId)"></tr>
    </table>
  </mat-card>

  <div class="footer-actions" *ngIf="authService.isAdmin() || authService.currentRole() === 'DOCENTE'">
    <button mat-raised-button color="primary">
      <mat-icon>save</mat-icon> Finalizar Registro
    </button>
  </div>
</div>
