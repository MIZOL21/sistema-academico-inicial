<div class="container">
  <div class="header">
    <h1>Reporte de Evaluaciones</h1>
    <button mat-raised-button color="accent">
      <mat-icon>file_download</mat-icon> Exportar PDF
    </button>
  </div>

  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Filtrar por estudiante o materia</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="Ej. Matemáticas">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <mat-card class="grades-card">
    <table mat-table [dataSource]="dataSource" class="full-width-table">
      
      <ng-container matColumnDef="estudiante">
        <th mat-header-cell *matHeaderCellDef> Estudiante </th>
        <td mat-cell *matCellDef="let row"> {{row.studentName}} </td>
      </ng-container>

      <ng-container matColumnDef="materia">
        <th mat-header-cell *matHeaderCellDef> Materia </th>
        <td mat-cell *matCellDef="let row"> {{row.materia}} </td>
      </ng-container>

      <ng-container matColumnDef="promedio">
        <th mat-header-cell *matHeaderCellDef> Promedio Final </th>
        <td mat-cell *matCellDef="let row">
          <span class="grade-badge" [ngClass]="getGradeClass(row.promedio)">
            {{row.promedio}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="cualitativa">
        <th mat-header-cell *matHeaderCellDef> Eval. Cualitativa </th>
        <td mat-cell *matCellDef="let row">
          <span class="qualitative-text" [ngClass]="getGradeClass(row.promedio)">
            {{ getQualitativeLabel(row.promedio) }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button color="primary" (click)="openEditDialog(row)" 
                  [disabled]="!authService.isAdmin() && authService.currentRole() !== 'DOCENTE'">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteGrade(row.studentId, row.materia)"
                  [disabled]="!authService.isAdmin() && authService.currentRole() !== 'DOCENTE'">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
