<div class="sidebar d-flex flex-column flex-shrink-0 p-3 bg-white border-end vh-100">
  <div class="d-flex align-items-center mb-4 px-2">
    <div class="logo-box bg-primary rounded-3 p-2 me-2">
      <i class="bi bi-journal-text text-white fs-4"></i>
    </div>
    <div>
      <h6 class="fw-bold mb-0 lh-1">Sistema</h6>
      <h6 class="fw-bold mb-0 lh-1">Académico</h6>
      <small class="text-muted" style="font-size: 0.65rem;">Educación Inicial</small>
    </div>
  </div>

  <ul class="nav nav-pills flex-column mb-auto">
    @for (item of menuItems; track item.label) {
      <li class="nav-item">
        <a [routerLink]="item.route" routerLinkActive="active shadow-sm" [routerLinkActiveOptions]="{exact: true}"
           class="nav-link d-flex align-items-center py-2 px-3 mb-1 text-secondary" style="font-size: 0.9rem;">
          <i class="bi {{item.icon}} me-3 fs-5"></i>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</div>
