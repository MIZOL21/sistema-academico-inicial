<nav class="navbar">
  <div class="user-profile" [matMenuTriggerFor]="userMenu">
    <div class="user-info">
      <span class="user-name">Admin Usuario</span>
      <span class="user-role">Administrador</span>
    </div>
    <div class="user-avatar">
      AU
    </div>
  </div>

  <mat-menu #userMenu="matMenu" xPosition="before" class="custom-user-menu">
    <div class="menu-header">
      <div class="avatar-large">AU</div>
      <div class="info-large">
        <span class="name">Admin Usuario</span>
        <span class="role">Administrador</span>
      </div>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="viewProfile()">
      <mat-icon>person</mat-icon>
      <span>Ver Perfil</span>
    </button>
    <button mat-menu-item (click)="viewSettings()">
      <mat-icon>settings</mat-icon>
      <span>Configuración</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item (click)="logout()" class="logout-item">
      <mat-icon color="warn">logout</mat-icon>
      <span class="warn-text">Cerrar Sesión</span>
    </button>
  </mat-menu>
</nav>
